services:  
  db-relational:
    image: postgres:18-alpine
    container_name: postgres_db
    restart: always
    networks:
      - backend-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    #ports:
    #  - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    networks:
      - backend-network
    environment:      
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    #ports:
    #  - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  document-processor:
    build: ./service-doc-proc
    container_name: doc_processor_app
    depends_on:
      - db-relational
      - mongodb
    networks:
      - backend-network  
    #abierto por el momento hasta que se configure el bff que sirva de entrada a la app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGO_URL=${MONGO_URL}
    healthcheck:      
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s 

networks:
  backend-network:
    name: backend-network
    driver: bridge    
  frontend-network:
    name: frontend-network
    driver: bridge

volumes:
  postgres_data:
  mongo_data: