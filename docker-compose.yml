services:  
  db-relational:
    image: postgres:18-alpine
    container_name: postgres_db
    restart: always
    networks:
      - backend-network
    env_file:
      - .env  
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    #ports:
    #  - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    networks:
      - backend-network
    env_file:
      - .env  
    environment:      
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    #ports:
    #  - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: minio_storage
    #ports:
    #  - "${STORAGE_PORT}:${STORAGE_PORT}"  
    #  - "9001:9001"                        
    networks:
      - backend-network
    environment:
      MINIO_ROOT_USER: ${STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  document-processor:
    build: ./service-doc-proc
    container_name: doc_processor_app
    depends_on:
      - db-relational
      - mongodb
      - minio
    networks:
      - backend-network      
    #ports:
    #  - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGO_URL=${MONGO_URL}
    healthcheck:      
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always   

  bff-node:
    build: ./bff-node
    container_name: bff_node_app
    restart: always
    depends_on:
      document-processor:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    ports:
      - "3000:3000"
    environment:
      - DOCUMENT_PROCESSOR_URL=http://doc_processor_app:8000
      - PORT=3000
  

networks:
  backend-network:
    name: backend-network
    driver: bridge    
  frontend-network:
    name: frontend-network
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  minio_data: