name: Docker Publish compliance-processor

on:
  push:
    branches: [ "main", "feature/multi-arch-support" ]
    paths:
      - 'bff-node/**'
      - 'frontend-react/**'
      - 'service-doc-proc/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Servicio a construir'
        required: true
        type: choice
        options:
          - bff-node
          - frontend-react
          - service-doc-proc
      tag_name:
        description: 'Tag manual (ej. v1.0.0)'
        required: false
        default: 'manual'

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      build_bff: ${{ steps.filter.outputs.bff == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.service == 'bff-node') }}
      build_front: ${{ steps.filter.outputs.front == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.service == 'frontend-react') }}
      build_proc: ${{ steps.filter.outputs.proc == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.service == 'service-doc-proc') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            bff: 'bff-node/**'
            front: 'frontend-react/**'
            proc: 'service-doc-proc/**'

  build:
    needs: analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: bff
            context: bff-node
            image: compliance-bff
            run_flag: ${{ needs.analyze.outputs.build_bff }}
          - id: front
            context: frontend-react
            image: compliance-frontend
            run_flag: ${{ needs.analyze.outputs.build_front }}
          - id: proc
            context: service-doc-proc
            image: compliance-processor
            run_flag: ${{ needs.analyze.outputs.build_proc }}
    steps:
      - name: Checkout repository
        if: ${{ matrix.run_flag == 'true' }}
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: ${{ matrix.run_flag == 'true' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ matrix.run_flag == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ matrix.run_flag == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ matrix.run_flag == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag_name }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short,prefix=v-,enable=${{ github.event_name == 'push' }}

      - name: Build and push
        if: ${{ matrix.run_flag == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}